BASE: ['']

TOOLBOX_MODE: "unsupervised_method"

UNSUPERVISED:
  METHOD: ["ICA", "POS", "CHROM", "GREEN", "LGI", "PBV", "OMIT"]
  METRICS: ['MAE', 'RMSE', 'MAPE', 'Pearson', 'SNR', 'BA']
  DATA:
    FS: 30                            # fps del video — verificar con get_video_info()
    DATASET: ISB
    DO_PREPROCESS: True               # True la primera vez; False a partir de la segunda ejecución
    DATA_FORMAT: NDHWC
    DATA_PATH: "/run/media/lJIMENEZ/datos/Proyectos/NANCI/ISB_DATASET/ISB_DATASET/"            # <-- ACTUALIZAR con tu ruta real
    CACHED_PATH: "/run/media/lJIMENEZ/datos/Proyectos/NANCI/ISB_DATASET/ISB_DATASET/PROCESS/"  # <-- ACTUALIZAR con tu ruta real
    EXP_DATA_NAME: ""
    BEGIN: 0.0
    END: 1.0                          # usar 0.1 para probar con los primeros 5 sujetos
    PREPROCESS:
      DATA_TYPE: ['Raw']
      DATA_AUG: ['None']
      LABEL_TYPE: Raw
      DO_CHUNK: False
      CHUNK_LENGTH: 180               # 30 s @ 30 fps — consistente con VitalVideos
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'HC'                 # HC = Haar Cascade
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY: 30
          USE_MEDIAN_FACE_BOX: False
      RESIZE:
        H: 72
        W: 72

INFERENCE:
  EVALUATION_METHOD: "FFT"
  EVALUATION_WINDOW:
    USE_SMALLER_WINDOW: False
    WINDOW_SIZE: 10

LOG:
  PATH: "runs/ISB_Unsupervised"
